# op-toolkit template: api-credential (scoped service token with expiry and permission metadata)
# usage: op-item-new.sh api-credential.yaml
# customize then run, or copy to your own template path

title: "Cloudflare API Token - DNS Read Only (monitoring)"
category: api-credential
vault: Infrastructure
url: https://dash.cloudflare.com/profile/api-tokens
username: ops@example.com

# paste the real token value here; "generate" is not used for API tokens (they come from the service)
password: dummy-token-replace-me

sections:
  Permissions:
    scope: "Zone:DNS:Read, Zone:Zone:Read"
    role: read-only
    IP restrictions: "203.0.113.0/24 (monitoring subnet only)"
    zones: "example.com, example.net"

  Issued:
    created: "2026-04-12"
    expires: "2027-04-12"
    TTL: "365 days"
    issued by: ops@example.com

  Usage:
    read command: "op read op://Infrastructure/Cloudflare API Token - DNS Read Only/password"
    env var: CF_DNS_TOKEN
    used by: "Prometheus Blackbox Exporter, uptime-monitor service on mon-01"

notes: |
  Purpose: read-only DNS and zone metadata access for the external monitoring pipeline. Used
  by the Prometheus Blackbox Exporter on mon-01 to validate DNS propagation after deployments.
  Rotation: token expires 2027-04-12. Rotate 30 days before expiry. Create a new token first,
  update this item, then restart the monitoring service before revoking the old token.
  Do NOT grant write permissions -- a separate write token exists for the deploy pipeline.
  Related: "Cloudflare API Token - Deploy Pipeline (DNS Write)", "mon-01 server", "CF Zone - example.com"
